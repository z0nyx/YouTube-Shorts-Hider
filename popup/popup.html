<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorts Hider</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup">
    <div class="title-wrap">
      <img src="../assets/icon.svg" alt="Shorts Hider" class="logo" />
      <h1>YouTube Shorts Hider</h1>
    </div>

    <label class="setting">
      <span>Расширение включено</span>
      <input type="checkbox" id="enabled" />
    </label>

    <label class="setting">
      <span>Закрывать вкладку при переходе в Shorts</span>
      <input type="checkbox" id="closeOnShorts" />
    </label>
  </main>

  <script src="popup.js"></script>
</body>
</html>
